<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Percorsi – Lo Bouc e lo Berio</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
<link rel="icon" href="favicon.png" type="image/png">

<style>
#map { height: 600px; }

body{
font-family:'Inter', sans-serif;
margin:0;
color:#333;
background: linear-gradient(to bottom,#bcd8cc 0%,#8fb3a3 30%,#d6cec2 70%,#b8aea0 100%);
background-attachment: fixed;
}

h1, h2{font-family:'Playfair Display', serif;text-align:center;}

.container{max-width:800px;margin:2px auto;padding:20px;}

.card{background:rgba(255,255,255,0.9);padding:24px;border-radius:16px;box-shadow:0 10px 28px rgba(0,0,0,0.1);margin-bottom:16px;}

.faq-item{margin-bottom:12px;border-radius:12px;overflow:hidden;}
.faq-question{background:#2f5d50;color:white;padding:14px;cursor:pointer;}
.faq-answer{display:none;padding:14px;background:#f7f7f7;}

img{max-width:100%;border-radius:10px;margin-top:10px}

.filters{margin:20px 0;text-align:center}
select{padding:6px 10px;border-radius:8px}

</style>
</head>

<body>

<div class="container">
<h1>I nostri percorsi ciclo-pedonali</h1>

<div class="filters">
Tipo:
<select id="filtro-tipo" onchange="filtra()">
<option value="">Tutti</option>
<option value="trekking">Trekking</option>
<option value="mtb">MTB</option>
<option value="strada">Strada</option>
</select>

Difficoltà:
<select id="filtro-diff" onchange="filtra()">
<option value="">Tutte</option>
<option value="Facile">Facile</option>
<option value="Media">Media</option>
<option value="Difficile">Difficile</option>
</select>
</div>

<div id="map"></div>

<div class="card" id="lista-percorsi"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-gpx/gpx.js"></script>

<script>

var map = L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var colori = { trekking:"green", mtb:"red", strada:"blue" };

var selectedLayer = null;

var percorsi = [
  {id:"p1", nome:"🥾 Trekking 1", tipo:"trekking", file:"trekking1.gpx", difficolta:"Facile", immagini:["img1.jpg"]},
  {id:"p2", nome:"🚵 MTB 1", tipo:"mtb", file:"mtb1.gpx", difficolta:"Media", immagini:["img2.jpg"]}
];

var group = L.featureGroup().addTo(map);
var layers = {};

percorsi.forEach(p => {

  var gpx = new L.GPX(p.file, {
    async:true,
    polyline_options:{color:colori[p.tipo], weight:4},
    marker_options:{
      startIcon: L.icon({iconUrl:'https://cdn-icons-png.flaticon.com/512/684/684908.png', iconSize:[25,25]}),
      endIcon: L.icon({iconUrl:'https://cdn-icons-png.flaticon.com/512/149/149059.png', iconSize:[25,25]})
    }
  })

  .on('loaded', function(e){
    var dist = (e.target.get_distance()/1000).toFixed(1);
    var elev = e.target.get_elevation_gain().toFixed(0);

    document.getElementById(p.id+"-info").innerHTML = `
      <p><b>Distanza:</b> ${dist} km</p>
      <p><b>Dislivello:</b> ${elev} m</p>
      <p><b>Difficoltà:</b> ${p.difficolta}</p>
      <a href="${p.file}" download>Scarica GPX</a>
    `;

    group.addLayer(e.target);
    map.fitBounds(group.getBounds());
  })

  .on('click', function(){

    // evidenzia
    if(selectedLayer){selectedLayer.setStyle({weight:4});}
    e.target.setStyle({weight:8});
    selectedLayer = e.target;

    map.fitBounds(e.target.getBounds());

    document.getElementById(p.id).scrollIntoView({behavior:'smooth'});
    toggle(p.id, true);
  })

  .bindPopup(p.nome)
  .addTo(map);

  layers[p.id] = gpx;

  document.getElementById('lista-percorsi').innerHTML += `
    <div class="faq-item percorso" data-tipo="${p.tipo}" data-diff="${p.difficolta}" id="${p.id}">
      <div class="faq-question" onclick="toggle('${p.id}')">${p.nome}</div>
      <div class="faq-answer">
        <div id="${p.id}-info">Caricamento...</div>
        ${p.immagini.map(img=>`<img src="${img}">`).join('')}
      </div>
    </div>
  `;
});

function toggle(id, forceOpen=false){
  var el = document.querySelector('#'+id+' .faq-answer');
  if(forceOpen){el.style.display='block'; return;}
  el.style.display = el.style.display==='block' ? 'none':'block';
}

function filtra(){
  var tipo = document.getElementById('filtro-tipo').value;
  var diff = document.getElementById('filtro-diff').value;

  document.querySelectorAll('.percorso').forEach(el=>{
    var show=true;
    if(tipo && el.dataset.tipo!==tipo) show=false;
    if(diff && el.dataset.diff!==diff) show=false;

    el.style.display = show?'block':'none';

    if(layers[el.id]){
      if(show) map.addLayer(layers[el.id]);
      else map.removeLayer(layers[el.id]);
    }
  });
}

</script>

</body>
</html>
