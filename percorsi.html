<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Percorsi – Lo Bouc e lo Berio</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

<style>

/* ==== TUO STILE ORIGINALE ==== */

body{
font-family:'Inter', sans-serif;
margin:0;
color:#333;
background: linear-gradient(to bottom,#bcd8cc 0%,#8fb3a3 30%,#d6cec2 70%,#b8aea0 100%);
background-attachment: fixed;
}

header{
background:
linear-gradient(rgba(9,9,9,1), rgba(20,40,35,0.55)),
url('header_transparent.png') center bottom/contain no-repeat;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

.logo{
width:33%;
max-width:1536px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

h1{font-family:'Playfair Display';text-align:center}

#map{
height:500px;
border-radius:16px;
margin-bottom:20px;
}

/* ==== NUOVA SIDEBAR ADATTATA ==== */

.filters{
margin-bottom:15px;
text-align:center;
}

select{
padding:8px;
margin:5px;
border-radius:8px;
border:none;
}

.lista{
margin-top:10px;
}

.card-percorso{
background:#f7f7f7;
padding:15px;
border-radius:12px;
margin-bottom:10px;
cursor:pointer;
transition:0.3s;
}

.card-percorso.active{
outline:3px solid #2f5d50;
transform:scale(1.02);
}

.card-percorso:hover{
background:#eee;
}

/* footer */
footer{
text-align:center;
padding:30px;
font-size:14px;
color:#777;
}

</style>
</head>

<body>

<header>
<img src="nuovo_logo.png" class="logo">
<div id="google_translate_element"></div>
</header>

<div class="container">

<h1>I nostri percorsi ciclo-pedonali</h1>

<div id="map"></div>

<div class="card">

<div class="filters">
<select id="filtro-tipo" onchange="filtra()">
<option value="">Tipo</option>
<option value="trekking">Trekking</option>
<option value="mtb">MTB</option>
<option value="strada">Strada</option>
</select>

<select id="filtro-diff" onchange="filtra()">
<option value="">Difficoltà</option>
<option value="Facile">Facile</option>
<option value="Media">Media</option>
<option value="Difficile">Difficile</option>
</select>
</div>

<div id="lista" class="lista"></div>

</div>

</div>

<footer>
Appartamenti vacanze a Fénis, vicino al Castello di Fénis.
</footer>

<!-- SCRIPT -->

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-gpx/gpx.js"></script>

<script>

/* MAPPA */

var map = L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var colori={trekking:'green',mtb:'red',strada:'blue'};
var layers={};
var selected=null;
var group=L.featureGroup().addTo(map);

/* PERCORSI */

var percorsi=[
{id:'p1',nome:'🥾 Trekking 1',tipo:'trekking',file:'percorsi/trekking1.gpx',difficolta:'Facile',immagini:['img1.jpg']},
{id:'p2',nome:'🚵 MTB 1',tipo:'mtb',file:'percorsi/mtb1.gpx',difficolta:'Media',immagini:['img2.jpg']}
];

/* CREAZIONE */

percorsi.forEach(p=>{

var gpx=new L.GPX(p.file,{
async:true,
polyline_options:{color:colori[p.tipo],weight:4}
})

.on('loaded',function(e){

var dist=(e.target.get_distance()/1000).toFixed(1);
var elev=e.target.get_elevation_gain().toFixed(0);

p.dist=dist;
p.elev=elev;

updateCard(p);

gpx.bindPopup(`<b>${p.nome}</b><br>${dist} km • ${elev} m<br><img src="${p.immagini[0]}" width="120">`);

group.addLayer(e.target);
map.fitBounds(group.getBounds());
})

.on('click',function(e){select(p.id,e.target)})
.on('mouseover',e=>e.target.setStyle({weight:6}))
.on('mouseout',e=>{if(e.target!==selected)e.target.setStyle({weight:4})})

.addTo(map);

layers[p.id]=gpx;

createCard(p);

});

/* CARD UI */

function createCard(p){
var el=document.createElement('div');
el.className='card-percorso';
el.id=p.id;
el.onclick=()=>select(p.id);
el.innerHTML=`<b>${p.nome}</b><div id="info-${p.id}">Caricamento...</div>`;
document.getElementById('lista').appendChild(el);
}

function updateCard(p){
document.getElementById('info-'+p.id).innerHTML=
`${p.dist} km • ${p.elev} m<br>${p.difficolta}`;
}

/* SELEZIONE */

function select(id,layer=null){
if(selected) selected.setStyle({weight:4});

if(layer){
layer.setStyle({weight:8});
selected=layer;
map.fitBounds(layer.getBounds());
}

document.querySelectorAll('.card-percorso')
.forEach(c=>c.classList.remove('active'));

document.getElementById(id).classList.add('active');

history.replaceState(null,null,'#'+id);
}

/* FILTRI */

function filtra(){
var tipo=document.getElementById('filtro-tipo').value;
var diff=document.getElementById('filtro-diff').value;

percorsi.forEach(p=>{
var show=true;

if(tipo && p.tipo!==tipo) show=false;
if(diff && p.difficolta!==diff) show=false;

document.getElementById(p.id).style.display=show?'block':'none';

if(show) map.addLayer(layers[p.id]);
else map.removeLayer(layers[p.id]);
});
}

/* DEEP LINK */

window.onload=()=>{
var id=location.hash.replace('#','');
if(id && layers[id]){
setTimeout(()=>select(id,layers[id]),1000);
}
};

</script>

<script>
function googleTranslateElementInit() {
new google.translate.TranslateElement(
{pageLanguage:'it'},
'google_translate_element'
);
}
</script>

<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
