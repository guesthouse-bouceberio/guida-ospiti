<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Percorsi – Lo Bouc e lo Berio</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet-elevation/dist/leaflet-elevation.min.css"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

<style>

/* ===== TUO STILE ORIGINALE ===== */

body{
font-family:'Inter', sans-serif;
margin:0;
color:#333;
background: linear-gradient(to bottom,#bcd8cc 0%,#8fb3a3 30%,#d6cec2 70%,#b8aea0 100%);
background-attachment: fixed;
}

header{
background:
linear-gradient(rgba(9,9,9,1), rgba(20,40,35,0.55)),
url('header_transparent.png') center bottom/contain no-repeat;
width:100%;
display:flex;
flex-direction:column;
justify-content:center;
}

.logo{
width:33%;
display:block;
margin:0 auto;
}

/* MOBILE LOGO */
@media (max-width:768px){
.logo{width:70%}
}

/* CONTAINER */
.container{
max-width:800px;
margin:auto;
padding:20px;
}

/* MAPPA */
#map{
height:500px;
border-radius:16px;
margin-bottom:15px;
}

/* GRAFICO */
#elevation{
height:120px;
margin-bottom:20px;
}

/* CARD LISTA */
.card-percorso{
background:rgba(255,255,255,0.9);
padding:20px;
border-radius:16px;
margin-bottom:10px;
cursor:pointer;
transition:0.3s;
}

.card-percorso.active{
outline:3px solid #2f5d50;
transform:scale(1.02);
}

.dettagli{
display:none;
margin-top:10px;
}

/* FOOTER */
footer{
text-align:center;
padding:30px;
font-size:14px;
color:#777;
}

html{scroll-behavior:smooth}

</style>

</head>

<body>

<header>
<img src="nuovo_logo.png" class="logo">
<div id="google_translate_element"></div>
</header>

<div class="container">

<h1 style="text-align:center;font-family:'Playfair Display'">I nostri percorsi</h1>

<div id="map"></div>
<div id="elevation"></div>

<div id="lista"></div>

</div>

<footer>
Appartamenti vacanze a Fénis, vicino al Castello di Fénis.
</footer>

<!-- SCRIPT -->

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-gpx/gpx.js"></script>
<script src="https://unpkg.com/leaflet-elevation/dist/leaflet-elevation.min.js"></script>

<script>

/* MAPPA */
var map = L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

/* GRAFICO */
var elevation = L.control.elevation({
position:"bottomright"
}).addTo(map);

/* VELOCITÀ */
var velocita={
trekking:4,
mtb:12,
strada:20
};

var layers={}, selected=null;

/* DATI PERCORSI */
var percorsi=[
{
id:'p1',
nome:'🥾 Trekking Lago',
tipo:'trekking',
file:'trekking1.gpx',
immagini:['img1.jpg']
},
{
id:'p2',
nome:'🚵 MTB Trail',
tipo:'mtb',
file:'mtb1.gpx',
immagini:['img2.jpg']
}
];

/* LOOP */
percorsi.forEach(p=>{

var gpx=new L.GPX(p.file,{async:true})

.on('loaded',function(e){

var dist=(e.target.get_distance()/1000);
var tempo=(dist/velocita[p.tipo]);

p.tempo=tempo.toFixed(1);

updateCard(p);

map.fitBounds(e.target.getBounds());

/* grafico */
elevation.clear();
elevation.load(p.file);

/* marker */
var pts=e.target.getLayers()[0].getLatLngs();
L.marker(pts[0]).addTo(map).bindPopup("Partenza");
L.marker(pts[pts.length-1]).addTo(map).bindPopup("Arrivo");

})

.on('click',function(){
select(p.id,e.target);
scrollToCard(p.id);
});

layers[p.id]=gpx.addTo(map);

createCard(p);

});

/* CARD */
function createCard(p){
var el=document.createElement('div');
el.className='card-percorso';
el.id=p.id;

el.innerHTML=`
<b>${p.nome}</b>
<div id="info-${p.id}">Caricamento...</div>

<div class="dettagli">
<img src="${p.immagini[0]}" width="100%">
</div>
`;

el.onclick=()=>select(p.id,layers[p.id]);

document.getElementById('lista').appendChild(el);
}

/* UPDATE */
function updateCard(p){
document.getElementById('info-'+p.id).innerHTML=
`⏱️ ${p.tempo} h • stimato`;
}

/* SELECT */
function select(id,layer){

if(selected) selected.setStyle({weight:4});

layer.setStyle({weight:7});
selected=layer;

document.querySelectorAll('.card-percorso').forEach(c=>{
c.classList.remove('active');
c.querySelector('.dettagli').style.display='none';
});

var el=document.getElementById(id);
el.classList.add('active');
el.querySelector('.dettagli').style.display='block';

map.fitBounds(layer.getBounds());
}

/* SCROLL */
function scrollToCard(id){
document.getElementById(id).scrollIntoView({behavior:'smooth',block:'center'});
}

</script>

<!-- TRADUTTORE -->
<script>
function googleTranslateElementInit() {
new google.translate.TranslateElement({pageLanguage:'it'},'google_translate_element');
}
</script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
